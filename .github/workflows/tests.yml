name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: infracciones_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: |
            # Esperar a que MySQL esté listo antes de testear
            until mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
              echo "Esperando a MySQL..."
              sleep 2
            done
            mvn -B test -Dspring.datasource.url=jdbc:mysql://localhost:3306/infracciones_db -Dspring.datasource.username=root -Dspring.datasource.password=mysql